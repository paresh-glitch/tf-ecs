name: CI — lint, scan, plan

on:
  pull_request:
    branches: [main, dev]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: lint frontend
        run: cd frontend && npm ci && npm run lint
      - name: lint backend
        run: cd backend && npm ci && npm run lint

  scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: audit frontend
        run: cd frontend && npm ci && npm audit --audit-level=critical || true
      - name: audit backend
        run: cd backend && npm ci && npm audit --audit-level=high || true

  plan:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v4

      - name: set env tag
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
          fi

      - name: configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::030635937630:role/github-actions-role
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v4

      - name: terraform init
        run: terraform init

      - name: terraform fmt check
        run: terraform fmt -check

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: |
          terraform plan -no-color \
            -var-file="${{ env.ENV_TAG }}.tfvars" \
            2>&1 | tee plan_output.txt

      - name: post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform plan — \`${{ env.ENV_TAG }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

name: cicd with terraform

on:
  push:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: install dep
        run: |
          cd frontend
          npm ci
          npm run lint

      - name: lint for backend
        run: |
          cd backend
          npm ci
          npm run lint


  scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: scan for frontend
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=critical || true

      - name: scan for backend
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This step determines if we are on dev or main and sets an environment variable
      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
          fi

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Uses $ENV_TAG to automatically push to dev-frontend:latest or prod-frontend:latest
      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-frontend:latest ./frontend
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-frontend:latest

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-backend:latest ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-backend:latest

      - name: Pull, tag, and push mongo
        run: |
          docker pull mongo:6
          docker tag mongo:6 ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-mongo:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ENV_TAG }}-mongo:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        run: terraform plan -var-file="${{ env.ENV_NAME }}.tfvars"

      - name: terraform apply
        run: terraform apply -auto-approve -var-file="${{ env.ENV_NAME }}.tfvars"



  

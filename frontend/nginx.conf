# ── nginx.conf (frontend container) ──────────
#
# IMPORTANT: Only a server {} block here.
# No events {} or http {} wrappers — those are in the main nginx.conf already.
#
# What this does:
#   - Serves the React frontend (static HTML/CSS/JS)
#   - Proxies any /api/ request to the backend container
#
# In ECS (same task), containers communicate via 127.0.0.1
# So backend is at 127.0.0.1:5000

server {
    listen 80;

    # ── Serve React App ───────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # This is critical for React Router:
        # If a file isn't found, serve index.html
        # (React handles routing client-side)
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /api calls to backend ───────────
    # When React calls /api/todos, nginx forwards it to backend:5000
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        # Pass the original request info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check endpoint ─────────────────
    # ECS ALB uses this to check if the frontend container is alive
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
